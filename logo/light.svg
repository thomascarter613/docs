<svg width="180" height="23" viewBox="0 0 180 23" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Monad Workspace Logo Light Variant</title>
  <desc id="desc">A compact horizontal logo for Monad Workspace optimized for light backgrounds.</desc>
  <defs>
    <linearGradient id="monadGradientLight" x1="2" y1="2" x2="22" y2="22" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#8B5CF6"/>
      <stop offset="0.52" stop-color="#06B6D4"/>
      <stop offset="1" stop-color="#22C55E"/>
    </linearGradient>
    <linearGradient id="textGradientLight" x1="31" y1="5" x2="166" y2="18" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#111827"/>
      <stop offset="1" stop-color="#374151"/>
    </linearGradient>
  </defs>

  <!-- Monad glyph -->
  <g transform="translate(1.5 1.5)">
    <rect x="0" y="0" width="20" height="20" rx="6" fill="#0B1020"/>
    <path d="M5.15 14.85V5.35L10 10.15L14.85 5.35V14.85" stroke="url(#monadGradientLight)" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="10" cy="10.15" r="1.65" fill="#F9FAFB"/>
  </g>

  <!-- Wordmark -->
  <text x="29" y="15.9"
        font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="13.4"
        font-weight="750"
        letter-spacing="-0.35"
        fill="url(#textGradientLight)">Monad</text>
  <text x="78.5" y="15.9"
        font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="13.4"
        font-weight="520"
        letter-spacing="-0.35"
        fill="#4B5563">Workspace</text>
</svg>
