<svg width="180" height="23" viewBox="0 0 180 23" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Monad Workspace Logo Dark Variant</title>
  <desc id="desc">A compact horizontal logo for Monad Workspace optimized for dark backgrounds.</desc>
  <defs>
    <linearGradient id="monadGradientDark" x1="2" y1="2" x2="22" y2="22" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#A78BFA"/>
      <stop offset="0.52" stop-color="#22D3EE"/>
      <stop offset="1" stop-color="#4ADE80"/>
    </linearGradient>
    <linearGradient id="textGradientDark" x1="31" y1="5" x2="166" y2="18" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F9FAFB"/>
      <stop offset="1" stop-color="#CBD5E1"/>
    </linearGradient>
  </defs>

  <!-- Monad glyph -->
  <g transform="translate(1.5 1.5)">
    <rect x="0" y="0" width="20" height="20" rx="6" fill="#0B1020" stroke="#374151" stroke-width="0.8"/>
    <path d="M5.15 14.85V5.35L10 10.15L14.85 5.35V14.85" stroke="url(#monadGradientDark)" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="10" cy="10.15" r="1.65" fill="#FFFFFF"/>
  </g>

  <!-- Wordmark -->
  <text x="29" y="15.9"
        font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="13.4"
        font-weight="750"
        letter-spacing="-0.35"
        fill="url(#textGradientDark)">Monad</text>
  <text x="78.5" y="15.9"
        font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="13.4"
        font-weight="520"
        letter-spacing="-0.35"
        fill="#94A3B8">Workspace</text>
</svg>
